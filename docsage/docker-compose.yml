version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docsage-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local

